name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # bouton "Run workflow" manuel

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" > /dev/null || true

      - name: Copy web app into Android assets
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html android/app/src/main/assets/index.html
          cp -r assets android/app/src/main/assets/assets

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: android
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PoigneCoeur-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
