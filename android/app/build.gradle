plugins {
    id "com.android.application" version "8.6.0"
}

android {
    namespace "com.poignecoeur.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.poignecoeur.app"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "2.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
